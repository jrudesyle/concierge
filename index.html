<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concierge — Agent Dashboard</title>
  <meta name="description" content="Multi-agent project workspace with AI chat, task tracking, and context management" />
  <meta name="theme-color" content="#5b8af5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Concierge" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icon-192.png" />
  <link rel="stylesheet" href="style.css?v=1779580165" />
</head>
<body data-theme="clean" class="sidebar-collapsed">
  <div class="app-layout">
    <!-- ── Header ── -->
    <header class="dashboard-header">
      <div class="header-left">
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">☰</button>
        <h1>🔧 Concierge</h1>
        <span class="header-subtitle">Agent Command Center</span>
      </div>
      <div class="header-right">
        <span class="clock" id="clock"></span>
        <button class="btn-icon settings-btn" id="settingsBtn" title="Settings">⚙️</button>
      </div>
    </header>

    <!-- ── Body Layout ── -->
    <div class="body-layout">
      <!-- ── Sidebar ── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span>Projects</span>
          <span class="project-count" id="agentCount">0</span>
        </div>
        <div class="sidebar-list" id="sidebarList">
          <!-- Sidebar items injected by JS -->
        </div>
        <div class="sidebar-footer">
          <button class="sidebar-add-btn" id="addAgentBtn">＋ New Project</button>
        </div>
      </aside>

      <!-- ── Main Content ── -->
      <main class="dashboard-main" id="dashboardMain">
        <!-- Tab panes injected by JS -->

      </main>
    </div>
  </div>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav" id="bottomNav">
    <div class="bottom-nav-list" id="bottomNavList">
      <!-- injected by JS -->
    </div>
  </nav>

  <!-- Bottom Sheet (mobile info panel) -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-content" id="bottomSheetContent">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="settings-modal">
    <div class="settings-content">
      <div class="settings-header">
        <h2>⚙️ Settings</h2>
        <button class="settings-close" id="settingsClose">✕</button>
      </div>
      <div class="settings-body">
        <section class="settings-section">
          <h3>🎨 Theme</h3>
          <div class="theme-picker" id="settingsThemePicker">
            <button class="theme-card active" data-theme="clean"><span class="theme-swatch swatch-clean"></span>Clean Light</button>
            <button class="theme-card" data-theme="nord"><span class="theme-swatch swatch-nord"></span>Nord</button>
            <button class="theme-card" data-theme="dracula"><span class="theme-swatch swatch-dracula"></span>Dracula</button>
            <button class="theme-card" data-theme="cyber"><span class="theme-swatch swatch-cyber"></span>Cyber</button>
          </div>
        </section>
        <section class="settings-section">
          <h3>🔔 Notifications</h3>
          <button class="settings-action-btn" id="settingsNotifBtn">Test Desktop Notification</button>
          <p class="settings-hint">Requires browser permission. Grant via browser address bar.</p>
        </section>
        <section class="settings-section">
          <h3>🔌 Connection</h3>
          <div class="settings-row">
            <span class="connection-status" id="settingsConnection">
              <span class="dot dot-green"></span>
              <span>Connected</span>
            </span>
          </div>
        </section>
        <section class="settings-section settings-about">
          <h3>ℹ️ About</h3>
          <div class="settings-row"><span class="settings-label">Version</span><span class="settings-value">Concierge v2</span></div>
          <div class="settings-row"><span class="settings-label">PWA</span><span class="settings-value">Installable</span></div>
          <div class="settings-row"><span class="settings-label">Global Context</span><span class="settings-value">🌐 Edit in sidebar</span></div>
        </section>
      </div>
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="app.js?v=1779580165"></script>
</body>
</html>
