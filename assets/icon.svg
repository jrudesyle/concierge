  </defs>
  <!-- Hexagon body -->
  <polygon points="256,30 446,143 446,369 256,482 66,369 66,143" fill="url(#bg)" stroke="url(#glow)" stroke-width="8"/>
  <!-- Inner hex ring -->
  <polygon points="256,70 406,165 406,347 256,442 106,347 106,165" fill="none" stroke="rgba(91,138,245,0.2)" stroke-width="2"/>
  <!-- C letter -->
  <path d="M190 190 Q 256 160 310 185" fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round"/>
  <path d="M190 190 L190 322" fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round"/>
  <path d="M190 322 Q 256 352 310 327" fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round"/>
  <!-- Circuit nodes -->
  <circle cx="340" cy="140" r="6" fill="url(#nodeGlow)" opacity="0.8"/>
  <circle cx="405" cy="190" r="4" fill="url(#nodeGlow)" opacity="0.6"/>
  <circle cx="370" cy="370" r="5" fill="url(#nodeGlow)" opacity="0.7"/>
  <circle cx="290" cy="430" r="4" fill="url(#nodeGlow)" opacity="0.5"/>
  <circle cx="156" cy="120" r="5" fill="url(#nodeGlow)" opacity="0.6"/>
  <circle cx="110" cy="300" r="4" fill="url(#nodeGlow)" opacity="0.5"/>
  <!-- Connection lines -->
  <line x1="340" y1="140" x2="405" y2="190" stroke="rgba(96,165,250,0.3)" stroke-width="2"/>
  <line x1="405" y1="190" x2="370" y2="370" stroke="rgba(96,165,250,0.2)" stroke-width="1.5"/>
  <line x1="370" y1="370" x2="290" y2="430" stroke="rgba(96,165,250,0.2)" stroke-width="1.5"/>
  <line x1="156" y1="120" x2="340" y2="140" stroke="rgba(96,165,250,0.15)" stroke-width="1.5"/>
